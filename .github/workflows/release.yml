name: Release Wails App

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact: build/bin/*.exe
          - os: macos-latest
            platform: darwin/universal
            artifact: build/bin/*.app
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build App
        run: wails build -clean -platform ${{ matrix.platform }}

      - name: Zip macOS App (macOS only)
        if: matrix.os == 'macos-latest'
        run: |
          cd build/bin
          zip -r composer-mac.zip *.app
          echo "artifact=build/bin/composer-mac.zip" >> $GITHUB_ENV

      - name: Pass Windows Artifact
        if: matrix.os == 'windows-latest'
        # Windows runner uses PowerShell by default
        shell: bash
        run: |
          echo "artifact=${{ matrix.artifact }}" >> $GITHUB_ENV

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.artifact }}
